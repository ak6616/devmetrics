<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#111827"/>
  <!-- Terminal window -->
  <rect x="4" y="6" width="24" height="20" rx="2" fill="#1F2937"/>
  <!-- Terminal header bar -->
  <rect x="4" y="6" width="24" height="5" rx="2" fill="#374151"/>
  <circle cx="8" cy="8.5" r="1.2" fill="#EF4444"/>
  <circle cx="12" cy="8.5" r="1.2" fill="#F59E0B"/>
  <circle cx="16" cy="8.5" r="1.2" fill="#10B981"/>
  <!-- Bar chart -->
  <rect x="7" y="19" width="3" height="5" fill="#6EE7B7"/>
  <rect x="12" y="15" width="3" height="9" fill="#34D399"/>
  <rect x="17" y="12" width="3" height="12" fill="#10B981"/>
  <rect x="22" y="16" width="3" height="8" fill="#059669"/>
  <!-- Code prompt -->
  <text x="7" y="16" font-family="monospace" font-size="4" fill="#4ADE80">&gt;_</text>
</svg>
